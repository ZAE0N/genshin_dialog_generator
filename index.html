<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>원신 대화창 편집기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700&family=Noto+Serif+KR:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#14161c; --panel:#1c1f27; --panel-2:#242832; --line:#343947;
  --ink:#ece5d8; --ink-dim:#a9a496; --gold:#d8bd88; --gold-b:#f2d9a5;
  --accent:#ffbb45;
}
* { box-sizing:border-box; }
html,body { margin:0; height:100%; }
body {
  background:var(--bg); color:var(--ink);
  font-family:"Noto Sans KR",system-ui,-apple-system,"Segoe UI",sans-serif;
  display:flex; flex-direction:column;
}
header {
  padding:12px 20px; border-bottom:1px solid var(--line);
  display:flex; align-items:baseline; gap:12px; flex-wrap:wrap;
}
header h1 { margin:0; font-size:16px; font-weight:700; color:var(--gold-b); letter-spacing:.02em; }
header .sub { font-size:12px; color:var(--ink-dim); }
main { flex:1; display:flex; min-height:0; }
/* ---------- preview ---------- */
#previewWrap {
  flex:1; min-width:0; display:flex; align-items:center; justify-content:center;
  padding:18px; overflow:auto; background:
    repeating-conic-gradient(#191c23 0% 25%, #15181e 0% 50%) 0 0/22px 22px;
}
#stage { max-width:100%; max-height:100%; box-shadow:0 20px 50px -20px rgba(0,0,0,.7); border-radius:4px; }
/* ---------- controls ---------- */
#panel {
  width:330px; flex:none; border-left:1px solid var(--line); background:var(--panel);
  overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:16px;
}
fieldset { border:1px solid var(--line); border-radius:10px; padding:12px 12px 14px; margin:0; }
legend { font-size:12px; color:var(--gold); padding:0 6px; letter-spacing:.08em; }
label { display:block; font-size:12px; color:var(--ink-dim); margin:8px 0 4px; }
input[type=text], textarea {
  width:100%; background:var(--panel-2); color:var(--ink); border:1px solid var(--line);
  border-radius:7px; padding:8px 10px; font-size:14px; font-family:inherit;
}
textarea { resize:vertical; min-height:64px; }
input:focus, textarea:focus { outline:2px solid var(--gold); outline-offset:-1px; }
.row { display:flex; gap:8px; align-items:center; }
.row label { margin:0; }
input[type=range] { flex:1; accent-color:var(--gold); }
input[type=checkbox] { accent-color:var(--gold); width:15px; height:15px; }
button {
  background:var(--panel-2); color:var(--ink); border:1px solid var(--line);
  border-radius:8px; padding:8px 12px; font-size:13px; font-family:inherit; cursor:pointer;
}
button:hover { border-color:var(--gold); color:var(--gold-b); }
button:focus-visible { outline:2px solid var(--gold); outline-offset:1px; }
button.primary {
  background:linear-gradient(180deg,#e8cc96,#cfae74); color:#26200f; font-weight:700;
  border:none; padding:11px 14px; font-size:14px; width:100%;
}
button.primary:hover { filter:brightness(1.06); color:#26200f; }
.choice-row { display:flex; gap:6px; margin-top:6px; }
.choice-row input { flex:1; }
.choice-row button { flex:none; padding:6px 10px; }
.hint { font-size:11.5px; color:var(--ink-dim); line-height:1.5; margin:6px 0 0; }
#dims { font-size:11.5px; color:var(--ink-dim); }
#fileBtn { width:100%; }
@media (max-width:760px) {
  main { flex-direction:column; }
  #panel { width:100%; border-left:none; border-top:1px solid var(--line); }
  #previewWrap { min-height:44vh; }
}
</style>
</head>
<body>
<header>
  <h1>원신 대화창 편집기</h1>
  <span class="sub">이미지를 올리면 크기에 맞춰 대화창·선택지가 자동 배치됩니다</span>
</header>
<main>
  <div id="previewWrap"><canvas id="stage" width="1280" height="720"></canvas></div>

  <div id="panel">
    <fieldset>
      <legend>이미지</legend>
      <input type="file" id="file" accept="image/*" hidden>
      <button id="fileBtn">이미지 업로드…</button>
      <p id="dims">아직 업로드 안 됨 — 기본 캔버스 1280×720</p>
    </fieldset>

    <fieldset>
      <legend>대화창</legend>
      <label for="name">이름</label>
      <input type="text" id="name" placeholder="예: 파이몬" value="파이몬">
      <label for="subtitle">부제 (선택)</label>
      <input type="text" id="subtitle" placeholder="예: 최고의 동료">
      <label for="text">대사</label>
      <textarea id="text" placeholder="대사를 입력하세요">여기에 대사를 입력하면 자동으로 줄바꿈되고, 이미지 크기에 맞춰 글자 크기가 정해져!</textarea>
      <div class="row" style="margin-top:10px">
        <input type="checkbox" id="showTri" checked>
        <label for="showTri">진행 표시 ▾</label>
        <span style="width:12px"></span>
        <input type="checkbox" id="showBand" checked>
        <label for="showBand">하단 어둡게</label>
      </div>
    </fieldset>

    <fieldset>
      <legend>선택지</legend>
      <div id="choices"></div>
      <button id="addChoice" style="margin-top:8px">+ 선택지 추가</button>
      <p class="hint">비워두면 선택지는 표시되지 않아요. 화면 오른쪽 끝에 인게임처럼 밀착됩니다.</p>
    </fieldset>

    <fieldset>
      <legend>크기 조정</legend>
      <div class="row">
        <label for="scale" style="width:70px">전체 크기</label>
        <input type="range" id="scale" min="0.6" max="1.6" step="0.05" value="1">
        <span id="scaleVal" style="font-size:12px;width:34px;text-align:right">1.00</span>
      </div>
    </fieldset>

    <button class="primary" id="save">PNG로 저장</button>
    <p class="hint">저장은 업로드한 이미지의 <b>원본 해상도</b>로 렌더링됩니다. 미리보기 = 저장 결과.</p>
  </div>
</main>

<script>
"use strict";
/* ---------- embedded Genshin UI assets (extracted from PathOfGenshin/resources) ---------- */

const ASSET_TRI    = "data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABYAAAARCAYAAADZsVyDAAAACXBIWXMAAA7EAAAOxAGVKw4bAAABW0lEQVR42o2UTU7DQAyF36Sh4e9uLNn2Aqw4BAdACEFhg1QkNl0gLoVYdIOglGSCLflJ1pNaOtKTndjzaWJ7UsYZuIrakMbHsPRdUNsKxNXQ0ncJmKou+hlOcIZOTG1Y+g3BCdKbhlAfsZrB3EDoQdI0LOFI0F/Txq2UbDAVPTFP6MBD05GpC/iEGwP2Y/o2FSlLyaXQMnQBPTEdxzNz+4B+pdIMSZXN08a1OMclTnGBfdYnrvGCK5aEalKHuYol3mCFh3+hK8w9N9eYvAZcOkZL3OEDT1uhHlvinmOmBwxwAuYResUj3vGsTH/nMRm5So6CK4GmDdj1N8wNtEjQhb/zmOdEbi9wtO7IyBDMUaoGusUZvDkw32u/9riLYL15ZZztnOMuNJU55he51nLqMc/xyE3STF6ELTePNkHlJ6RwBTQZLE2uClWwwivhO/9uOmoKVrgkF81Rq5A/8d+5yYVsvskAAAAASUVORK5CYII=";    // UI_TalkClickA 22x17

const bubbleImg = new Image(); bubbleImg.src = ASSET_BUBBLE;
const triImg    = new Image(); triImg.src = ASSET_TRI;

const canvas = document.getElementById("stage");
const ctx = canvas.getContext("2d");

const state = {
  img: null, W: 1280, H: 720,
  name: "", subtitle: "", text: "",
  choices: [],
  showTri: true, showBand: true, scale: 1,
};

const FONT_BODY = '"Noto Sans KR","Apple SD Gothic Neo","Malgun Gothic",sans-serif';
const GOLD = "#ffc14d";
const TEXT_COL = "#f5f2e9";
const CHOICE_TEXT = "#f2efe6";

/* ---------- text wrapping (Korean: fall back to per-char when a word overflows) ---------- */
function wrapText(text, maxWidth) {
  const out = [];
  for (const raw of text.split("\n")) {
    if (!raw) { out.push(""); continue; }
    let line = "";
    for (const word of raw.split(" ")) {
      const cand = line ? line + " " + word : word;
      if (ctx.measureText(cand).width <= maxWidth) { line = cand; continue; }
      if (line) { out.push(line); line = ""; }
      if (ctx.measureText(word).width <= maxWidth) { line = word; continue; }
      let chunk = "";
      for (const ch of word) {
        if (ctx.measureText(chunk + ch).width > maxWidth && chunk) { out.push(chunk); chunk = ""; }
        chunk += ch;
      }
      line = chunk;
    }
    out.push(line);
  }
  while (out.length && out[out.length - 1] === "") out.pop();
  return out;
}

function drawDiamond(x, y, r, color) {
  ctx.save(); ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y - r); ctx.lineTo(x + r, y); ctx.lineTo(x, y + r); ctx.lineTo(x - r, y);
  ctx.closePath(); ctx.fill(); ctx.restore();
}

/* divider: ◆────────◆ ; if a subtitle is given, the line splits around it */
function drawDivider(cx, y, width, base, subtitle, subFS) {
  const r = Math.max(2.5, base * 0.007);
  const th = Math.max(1, base * 0.0022);
  ctx.save();
  ctx.fillStyle = GOLD; ctx.strokeStyle = GOLD; ctx.lineWidth = th;
  ctx.shadowColor = "rgba(0,0,0,.5)"; ctx.shadowBlur = base * 0.004;
  const x0 = cx - width / 2, x1 = cx + width / 2;
  if (subtitle) {
    ctx.font = `600 ${subFS}px ${FONT_BODY}`;
    const half = ctx.measureText(subtitle).width / 2 + subFS * 0.8;
    ctx.beginPath(); ctx.moveTo(x0 + r, y); ctx.lineTo(cx - half, y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx + half, y); ctx.lineTo(x1 - r, y); ctx.stroke();
    ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText(subtitle, cx, y);
  } else {
    ctx.beginPath(); ctx.moveTo(x0 + r, y); ctx.lineTo(x1 - r, y); ctx.stroke();
  }
  drawDiamond(x0, y, r, GOLD);
  drawDiamond(x1, y, r, GOLD);
  ctx.restore();
}

function drawBubbleIcon(x, y, size) {
  /* white bubble asset + three dark dots (asset is 99x84) */
  const w = size, h = size * (84 / 99);
  ctx.drawImage(bubbleImg, x, y + (size - h) / 2, w, h);
  const cx = x + w * 0.46, cy = y + (size - h) / 2 + h * 0.46;
  const r = w * 0.055, gap = w * 0.19;
  ctx.save(); ctx.fillStyle = "#3d4457";
  for (let i = -1; i <= 1; i++) {
    ctx.beginPath(); ctx.arc(cx + i * gap, cy, r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
}

function render() {
  const { W, H } = state;
  canvas.width = W; canvas.height = H;

  /* background */
  if (state.img) {
    ctx.drawImage(state.img, 0, 0, W, H);
  } else {
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, "#2a3547"); g.addColorStop(.6, "#1a2230"); g.addColorStop(1, "#11151d");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.fillStyle = "rgba(236,229,216,.28)";
    ctx.font = `500 ${Math.round(Math.min(W,H)*0.032)}px ${FONT_BODY}`;
    ctx.textAlign = "center";
    ctx.fillText("이미지를 업로드하면 여기에 표시됩니다", W/2, H*0.38);
    ctx.restore();
  }

  const base = Math.min(W, H) * state.scale;
  const portrait = H >= W;
  const cx = W / 2;

  const nameFS   = base * 0.040;
  const subFS    = base * 0.024;
  const textFS   = base * 0.036;
  const choiceFS = base * 0.028;
  const lineH    = textFS * 1.5;

  /* ----- dialogue block (bottom, centered) — measure first ----- */
  const hasDialog = state.text.trim() || state.name.trim();
  let textLines = [], nameTop = null;
  let blockTop = H;                       /* top of dialogue block, for band + choices */
  const bottomPad = H * 0.055;

  if (hasDialog) {
    ctx.font = `500 ${textFS}px ${FONT_BODY}`;
    textLines = state.text.trim() ? wrapText(state.text.trim(), W * 0.82) : [];
    const textH = textLines.length * lineH;
    const divGap = textFS * 0.65;
    const nameH = state.name.trim() ? nameFS * 1.25 : 0;
    const divH  = state.name.trim() ? divGap * 2 : 0;
    const triH  = state.showTri ? textFS * 0.9 : 0;
    blockTop = H - bottomPad - triH - textH - divH - nameH;
    nameTop = blockTop;
  }

  /* ----- darkening band ----- */
  if (state.showBand && hasDialog) {
    const g = ctx.createLinearGradient(0, blockTop - base * 0.10, 0, H);
    g.addColorStop(0, "rgba(10,12,16,0)");
    g.addColorStop(.45, "rgba(10,12,16,.38)");
    g.addColorStop(1, "rgba(10,12,16,.55)");
    ctx.fillStyle = g;
    ctx.fillRect(0, blockTop - base * 0.10, W, H - blockTop + base * 0.10);
  }

  /* ----- dialogue ----- */
  if (hasDialog) {
    let y = nameTop;
    ctx.save();
    ctx.textAlign = "center";
    ctx.shadowColor = "rgba(0,0,0,.55)"; ctx.shadowBlur = base * 0.008; ctx.shadowOffsetY = base * 0.002;

    if (state.name.trim()) {
      ctx.fillStyle = GOLD;
      ctx.font = `700 ${nameFS}px ${FONT_BODY}`;
      ctx.textBaseline = "top";
      ctx.fillText(state.name.trim(), cx, y);
      y += nameFS * 1.25;
      const divW = portrait ? W * 0.80 : W * 0.55;
      y += textFS * 0.65;
      ctx.shadowBlur = 0;
      drawDivider(cx, y, divW, base, state.subtitle.trim(), subFS);
      ctx.shadowBlur = base * 0.008;
      y += textFS * 0.65;
    }

    ctx.fillStyle = TEXT_COL;
    ctx.font = `500 ${textFS}px ${FONT_BODY}`;
    ctx.textBaseline = "top";
    for (const line of textLines) { ctx.fillText(line, cx, y); y += lineH; }
    ctx.restore();

    if (state.showTri && triImg.complete) {
      const tw = textFS * 0.72, thh = tw * (17 / 22);
      ctx.drawImage(triImg, cx - tw / 2, y + textFS * 0.18, tw, thh);
    }
  }

  /* ----- choices: right-edge anchored pills, stacked bottom-up above dialogue ----- */
  const items = state.choices.map(s => s.trim()).filter(Boolean);
  if (items.length && bubbleImg.complete) {
    const maxW = portrait ? W * 0.78 : W * 0.52;
    const icon = choiceFS * 1.55;
    const padV = choiceFS * 0.44, padL = choiceFS * 0.38, gapI = choiceFS * 0.42;
    const padR = choiceFS * 0.8;
    const gap = choiceFS * 0.5;
    const clineH = choiceFS * 1.35;
    const maxTextW = maxW - padL - icon - gapI - padR;

    ctx.font = `500 ${choiceFS}px ${FONT_BODY}`;
    const measured = items.map(t => {
      const lines = wrapText(t, maxTextW);
      const w = Math.max(...lines.map(l => ctx.measureText(l).width));
      return { lines, h: Math.max(icon, lines.length * clineH) + padV * 2, w };
    });

    let yBottom = (hasDialog ? blockTop : H - bottomPad) - base * 0.028;
    for (let i = measured.length - 1; i >= 0; i--) {
      const m = measured[i];
      const h = m.h, top = yBottom - h, r = h / 2;
      const pillW = Math.min(maxW, padL + icon + gapI + m.w + padR + choiceFS * 0.4);
      const x0 = W - pillW;

      ctx.save();
      ctx.beginPath();
      ctx.moveTo(x0 + r, top);
      ctx.lineTo(W + 2, top);
      ctx.lineTo(W + 2, top + h);
      ctx.lineTo(x0 + r, top + h);
      ctx.arc(x0 + r, top + r, r, Math.PI / 2, Math.PI * 1.5);
      ctx.closePath();
      ctx.fillStyle = "rgba(18,22,30,.55)";
      ctx.fill();
      ctx.strokeStyle = "rgba(240,238,229,.55)";
      ctx.lineWidth = Math.max(1, base * 0.0016);
      ctx.stroke();

      drawBubbleIcon(x0 + padL, top + (h - icon) / 2, icon);

      ctx.fillStyle = CHOICE_TEXT;
      ctx.font = `500 ${choiceFS}px ${FONT_BODY}`;
      ctx.textAlign = "left"; ctx.textBaseline = "middle";
      ctx.shadowColor = "rgba(0,0,0,.4)"; ctx.shadowBlur = base * 0.004;
      const tx = x0 + padL + icon + gapI;
      const ty0 = top + h / 2 - (m.lines.length - 1) * clineH / 2;
      m.lines.forEach((l, j) => ctx.fillText(l, tx, ty0 + j * clineH));
      ctx.restore();

      yBottom = top - gap;
    }
  }
}

/* ---------- UI wiring ---------- */
const $ = id => document.getElementById(id);

$("fileBtn").addEventListener("click", () => $("file").click());
$("file").addEventListener("change", e => {
  const f = e.target.files[0];
  if (!f) return;
  const url = URL.createObjectURL(f);
  const img = new Image();
  img.onload = () => {
    state.img = img; state.W = img.naturalWidth; state.H = img.naturalHeight;
    const portrait = state.H >= state.W;
    $("dims").textContent = `${state.W} × ${state.H} · ${portrait ? "세로형" : "가로형"} 자동 배치`;
    URL.revokeObjectURL(url);
    render();
  };
  img.src = url;
});

for (const id of ["name", "subtitle", "text"]) {
  $(id).addEventListener("input", () => { state[id] = $(id).value; render(); });
  state[id] = $(id).value;
}
$("showTri").addEventListener("change", () => { state.showTri = $("showTri").checked; render(); });
$("showBand").addEventListener("change", () => { state.showBand = $("showBand").checked; render(); });
$("scale").addEventListener("input", () => {
  state.scale = parseFloat($("scale").value);
  $("scaleVal").textContent = state.scale.toFixed(2);
  render();
});

/* choices list */
function syncChoices() {
  state.choices = [...document.querySelectorAll("#choices input")].map(i => i.value);
  render();
}
function addChoiceRow(value) {
  const row = document.createElement("div");
  row.className = "choice-row";
  const input = document.createElement("input");
  input.type = "text"; input.placeholder = "선택지 내용"; input.value = value || "";
  input.addEventListener("input", syncChoices);
  const del = document.createElement("button");
  del.type = "button"; del.textContent = "✕"; del.setAttribute("aria-label", "선택지 삭제");
  del.addEventListener("click", () => { row.remove(); syncChoices(); });
  row.append(input, del);
  $("choices").append(row);
}
$("addChoice").addEventListener("click", () => { addChoiceRow(""); syncChoices(); });
addChoiceRow("정말 짜증나지 않아?");
addChoiceRow("방화를 저지를 시간이다.");
syncChoices();

/* save */
$("save").addEventListener("click", () => {
  canvas.toBlob(blob => {
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "genshin_dialog.png";
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }, "image/png");
});

/* first paint: after fonts & assets */
Promise.all([
  document.fonts ? document.fonts.load(`700 20px "Noto Sans KR"`).catch(() => {}) : Promise.resolve(),
  new Promise(res => bubbleImg.complete ? res() : bubbleImg.addEventListener("load", res)),
  new Promise(res => triImg.complete ? res() : triImg.addEventListener("load", res)),
]).then(render);
render();
</script>
</body>
</html>
